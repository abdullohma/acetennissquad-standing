<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ACE Tennis League - Season Leaderboard</title>
    
    <!-- Google Fonts: Poppins -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Poppins', 'sans-serif'],
                    },
                    colors: {
                        ace: {
                            light: '#a855f7', // Purple 500
                            DEFAULT: '#7e22ce', // Purple 700
                            dark: '#581c87', // Purple 900
                            accent: '#65a30d', // Lime 600 (Green)
                        }
                    }
                }
            }
        }
    </script>
    
    <style>
        /* Custom Scrollbar for the table */
        .table-container::-webkit-scrollbar {
            height: 8px;
        }
        .table-container::-webkit-scrollbar-track {
            background: #f1f5f9;
            border-radius: 4px;
        }
        .table-container::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 4px;
        }
        .table-container::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }
    </style>
</head>
<body class="bg-gradient-to-br from-slate-900 via-purple-900 to-slate-800 min-h-screen p-4 md:p-8 text-slate-800 antialiased selection:bg-ace-light selection:text-white">

    <div class="max-w-7xl mx-auto bg-white rounded-3xl shadow-2xl overflow-hidden ring-1 ring-white/20">
        
        <!-- Header Section -->
        <div class="relative bg-white px-6 py-16 md:py-20 text-center border-b border-slate-100 overflow-hidden">
            <!-- Decorative background elements -->
            <!-- Dot pattern background -->
            <div class="absolute inset-0 opacity-40" style="background-image: radial-gradient(#94a3b8 1.5px, transparent 1.5px); background-size: 24px 24px; mask-image: linear-gradient(to bottom, black 40%, transparent 100%); -webkit-mask-image: linear-gradient(to bottom, black 40%, transparent 100%);"></div>

            <div class="absolute top-0 left-0 w-full h-full overflow-hidden z-0 opacity-60 pointer-events-none">
                <div class="absolute -top-20 -left-10 w-64 h-64 bg-purple-300 rounded-full mix-blend-multiply filter blur-3xl opacity-60 animate-pulse" style="animation-duration: 4s;"></div>
                <div class="absolute top-10 -right-10 w-64 h-64 bg-lime-200 rounded-full mix-blend-multiply filter blur-3xl opacity-60 animate-pulse" style="animation-duration: 5s;"></div>
            </div>

            <div class="relative z-10 flex flex-col items-center">
                <div class="relative mb-6 group">
                    <!-- Subtle glowing aura behind logo -->
                    <div class="absolute inset-0 bg-gradient-to-tr from-purple-200 to-lime-200 rounded-full blur-2xl opacity-40 group-hover:opacity-70 transition-opacity duration-500"></div>
                    <img src="https://github.com/abdullohma/shareable-figure/blob/main/IMG_1528.png?raw=true" alt="ACE Tennis Squad Logo" class="relative z-10 h-48 md:h-60 w-auto object-contain hover:scale-105 transition-transform duration-500 mix-blend-multiply brightness-105">
                </div>
                
                <h1 class="text-4xl md:text-5xl lg:text-6xl font-extrabold mb-3 tracking-tight">
                    <span class="bg-gradient-to-r from-ace-dark via-ace to-lime-600 bg-clip-text text-transparent drop-shadow-sm">
                        Season Leaderboard
                    </span>
                </h1>
                
                <div class="flex items-center justify-center gap-4 mb-10 mt-2">
                    <div class="h-px w-12 md:w-20 bg-gradient-to-r from-transparent to-purple-300"></div>
                    <p class="text-xl md:text-2xl font-black text-purple-500 tracking-[0.25em] uppercase drop-shadow-sm">2026</p>
                    <div class="h-px w-12 md:w-20 bg-gradient-to-l from-transparent to-purple-300"></div>
                </div>
                
                <div class="inline-flex items-center gap-2.5 bg-white text-slate-700 px-6 py-2.5 rounded-full text-sm font-bold shadow-[0_4px_20px_-4px_rgba(101,163,13,0.3)] border border-lime-100 hover:shadow-[0_4px_20px_-4px_rgba(101,163,13,0.5)] transition-all hover:-translate-y-0.5">
                    <!-- Live indicator dot -->
                    <span class="relative flex h-3 w-3">
                      <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-lime-400 opacity-75"></span>
                      <span class="relative inline-flex rounded-full h-3 w-3 bg-lime-500"></span>
                    </span>
                    Current League Standings
                </div>
            </div>
        </div>

        <!-- Main Content -->
        <div class="p-6 md:p-10">
            
            <!-- Filter & Stats Row -->
            <div class="flex flex-col lg:flex-row gap-8 mb-10">
                
                <!-- Filter Section -->
                <div class="bg-slate-50 p-6 rounded-2xl border border-slate-200 flex-1 lg:max-w-sm">
                    <div class="flex items-center gap-2 mb-4">
                        <span class="text-xl">📊</span>
                        <h3 class="text-lg font-bold text-slate-800">Filter Tampilan</h3>
                    </div>
                    <div class="space-y-4">
                        <div>
                            <label for="minGames" class="block text-sm font-semibold text-slate-600 mb-2">Minimum Games Played:</label>
                            <div class="relative">
                                <select id="minGames" onchange="filterPlayers()" class="w-full appearance-none bg-white border-2 border-slate-200 text-slate-700 py-3 px-4 pr-8 rounded-xl leading-tight focus:outline-none focus:border-ace focus:ring-4 focus:ring-ace/10 transition-all cursor-pointer font-medium">
                                    <option value="0" selected>Semua Pemain</option>
                                    <option value="5">5+ Games</option>
                                    <option value="10">10+ Games</option>
                                    <option value="15">15+ Games</option>
                                    <option value="20">20+ Games</option>
                                </select>
                                <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-slate-500">
                                    <svg class="fill-current h-4 w-4" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20"><path d="M9.293 12.95l.707.707L15.657 8l-1.414-1.414L10 10.828 5.757 6.586 4.343 8z"/></svg>
                                </div>
                            </div>
                        </div>
                        <div class="text-sm font-medium text-ace flex items-center gap-2 bg-ace/5 p-3 rounded-lg border border-ace/10">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"></path></svg>
                            <span id="playerCount">Memuat...</span>
                        </div>
                    </div>
                </div>

                <!-- Stats Summary Section -->
                <div class="flex-1 grid grid-cols-2 md:grid-cols-4 gap-4" id="statsSummary">
                    <!-- Cards injected by JS -->
                </div>
            </div>

            <!-- Formula Info Box -->
            <div class="mb-6 bg-purple-50 border border-purple-100 rounded-xl p-4 md:p-5 flex items-start sm:items-center gap-4 shadow-sm transition-all hover:shadow-md">
                <div class="bg-purple-200/50 p-3 rounded-xl shrink-0">
                    <span class="text-xl sm:text-2xl leading-none">🧮</span>
                </div>
                <div>
                    <h4 class="text-sm font-extrabold text-purple-900 mb-1.5 uppercase tracking-wider">Rumus Perhitungan Poin</h4>
                    <div class="text-xs sm:text-sm text-purple-800 flex flex-wrap items-center gap-x-2 gap-y-2 font-medium">
                        <span class="bg-purple-200/60 px-2.5 py-1 rounded-md text-purple-900 font-bold">Total Poin</span> 
                        <span class="font-bold text-purple-400">=</span>
                        <span class="bg-white px-2.5 py-1 rounded-md shadow-sm border border-purple-100/50">Win %</span> 
                        <span class="font-bold text-purple-400">+</span>
                        <span class="bg-white px-2.5 py-1 rounded-md shadow-sm border border-purple-100/50">Total Diff × 0.2</span>
                        <span class="font-bold text-purple-400">+</span>
                        <span class="bg-white px-2.5 py-1 rounded-md shadow-sm border border-purple-100/50">Avg Diff × 2.0</span>
                        <span class="font-bold text-purple-400">+</span>
                        <span class="bg-white px-2.5 py-1 rounded-md shadow-sm border border-purple-100/50">Games × 0.18</span>
                    </div>
                </div>
            </div>

            <!-- Table Section -->
            <div class="bg-white rounded-2xl border border-slate-200 overflow-hidden shadow-sm">
                <div class="table-container overflow-x-auto">
                    <table class="w-full whitespace-nowrap text-sm text-left">
                        <thead class="bg-ace-dark text-white uppercase font-semibold text-xs tracking-wider">
                            <tr>
                                <th scope="col" class="px-6 py-4 text-center rounded-tl-xl">Rank</th>
                                <th scope="col" class="px-6 py-4">Player</th>
                                <th scope="col" class="px-6 py-4 text-center bg-ace">Total Poin</th>
                                <th scope="col" class="px-6 py-4 text-center">Record (W-L)</th>
                                <th scope="col" class="px-6 py-4 text-center">Win %</th>
                                <th scope="col" class="px-6 py-4 text-center">Total Diff</th>
                                <th scope="col" class="px-6 py-4 text-center">Avg Diff</th>
                                <th scope="col" class="px-6 py-4 text-center">Diff Bonus</th>
                                <th scope="col" class="px-6 py-4 text-center">Games Bonus</th>
                                <th scope="col" class="px-6 py-4 text-center rounded-tr-xl">Games</th>
                            </tr>
                        </thead>
                        <tbody id="leaderboardBody" class="divide-y divide-slate-100">
                            <!-- Rows injected by JS -->
                        </tbody>
                    </table>
                </div>
            </div>
            
        </div>
    </div>

    <script>
        // Data mentah pemain (hanya perlu masukkan games, wins, dan totalDiff)
        const rawPlayersData = [
            { name: "Gian", games: 10, wins: 8, totalDiff: 22 },
            { name: "Aliy", games: 41, wins: 32, totalDiff: 42 },
            { name: "Tommy", games: 19, wins: 13, totalDiff: 19 },
            { name: "Faiz", games: 12, wins: 8, totalDiff: 15 },
            { name: "Whika", games: 12, wins: 8, totalDiff: 7 },
            { name: "Leo", games: 13, wins: 8, totalDiff: 5 },
            { name: "Frans", games: 21, wins: 12, totalDiff: 1 },
            { name: "Reiza", games: 18, wins: 9, totalDiff: 4 },
            { name: "Kurniawan", games: 8, wins: 2, totalDiff: -7 },
            { name: "Bayu", games: 15, wins: 7, totalDiff: -8 },
            { name: "Zidan", games: 14, wins: 5, totalDiff: -14 },
            { name: "Huda", games: 14, wins: 4, totalDiff: -10 },
            { name: "Betty", games: 13, wins: 4, totalDiff: -14 },
            { name: "Gusti", games: 19, wins: 11, totalDiff: 5 },
            { name: "Raka", games: 3, wins: 1, totalDiff: -2 },
            { name: "Kiswoyo", games: 7, wins: 3, totalDiff: -2 },
            { name: "Koesadn", games: 20, wins: 7, totalDiff: -3 }
        ];

        // Menghitung poin secara dinamis berdasarkan rumus:
        // Points = Win% + (Total_Diff * 0.2) + (Avg_Diff * 2.0) + (Games * 0.18)
        const playersData = rawPlayersData.map(p => {
            const winRate = p.games > 0 ? (p.wins / p.games) * 100 : 0;
            const avgDiff = p.games > 0 ? p.totalDiff / p.games : 0;
            const diffBonus = (p.totalDiff * 0.2) + (avgDiff * 2.0);
            const gamesBonus = p.games * 0.18;
            const totalPoints = winRate + diffBonus + gamesBonus;

            return {
                ...p,
                winRate,
                avgDiff,
                diffBonus,
                gamesBonus,
                totalPoints
            };
        });

        let filteredPlayers = [...playersData];

        function getNumberColorClass(value, isPercentage = false) {
            if (value > 0 || (isPercentage && value >= 50)) return 'text-emerald-600 font-semibold bg-emerald-50 px-2 py-1 rounded-md';
            if (value < 0 || (isPercentage && value < 50)) return 'text-rose-600 font-semibold bg-rose-50 px-2 py-1 rounded-md';
            return 'text-slate-500 font-semibold bg-slate-50 px-2 py-1 rounded-md';
        }

        function filterPlayers() {
            const minGames = parseInt(document.getElementById('minGames').value);
            filteredPlayers = playersData.filter(p => p.games >= minGames);
            filteredPlayers.sort((a, b) => b.totalPoints - a.totalPoints);
            renderLeaderboard();
            renderStats();
        }

        function renderLeaderboard() {
            const tbody = document.getElementById('leaderboardBody');
            tbody.innerHTML = '';

            if(filteredPlayers.length === 0) {
                tbody.innerHTML = `<tr><td colspan="10" class="px-6 py-10 text-center text-slate-500">Tidak ada pemain yang memenuhi kriteria filter.</td></tr>`;
                document.getElementById('playerCount').textContent = `0 Pemain`;
                return;
            }

            filteredPlayers.forEach((player, index) => {
                const row = document.createElement('tr');
                row.className = 'hover:bg-purple-50/50 transition-colors duration-200 group';
                
                // Top 3 get special medals
                let rankDisplay = `<span class="inline-flex items-center justify-center w-8 h-8 rounded-full bg-slate-100 text-slate-600 font-bold">${index + 1}</span>`;
                if (index === 0) rankDisplay = `<span class="inline-flex items-center justify-center w-9 h-9 rounded-full bg-yellow-100 text-yellow-600 text-lg font-bold shadow-sm ring-2 ring-yellow-400/50">🥇</span>`;
                if (index === 1) rankDisplay = `<span class="inline-flex items-center justify-center w-9 h-9 rounded-full bg-slate-100 text-slate-500 text-lg font-bold shadow-sm ring-2 ring-slate-300">🥈</span>`;
                if (index === 2) rankDisplay = `<span class="inline-flex items-center justify-center w-9 h-9 rounded-full bg-orange-100 text-orange-700 text-lg font-bold shadow-sm ring-2 ring-orange-400/50">🥉</span>`;

                row.innerHTML = `
                    <td class="px-6 py-4 text-center">${rankDisplay}</td>
                    <td class="px-6 py-4">
                        <div class="font-bold text-slate-800 text-base group-hover:text-ace transition-colors">${player.name}</div>
                    </td>
                    <td class="px-6 py-4 text-center bg-ace/5 group-hover:bg-ace/10 transition-colors">
                        <span class="text-lg font-extrabold text-ace-dark">${player.totalPoints.toFixed(1)}</span>
                    </td>
                    <td class="px-6 py-4 text-center">
                        <span class="text-emerald-600 font-semibold">${player.wins}W</span> 
                        <span class="text-slate-300 mx-1">-</span> 
                        <span class="text-rose-500 font-semibold">${player.games - player.wins}L</span>
                    </td>
                    <td class="px-6 py-4 text-center">
                        <span class="${getNumberColorClass(player.winRate, true)}">${player.winRate.toFixed(1)}%</span>
                    </td>
                    <td class="px-6 py-4 text-center">
                        <span class="${getNumberColorClass(player.totalDiff)}">${player.totalDiff > 0 ? '+' : ''}${player.totalDiff}</span>
                    </td>
                    <td class="px-6 py-4 text-center">
                        <span class="${getNumberColorClass(player.avgDiff)}">${player.avgDiff > 0 ? '+' : ''}${player.avgDiff.toFixed(2)}</span>
                    </td>
                    <td class="px-6 py-4 text-center">
                        <span class="${getNumberColorClass(player.diffBonus)}">${player.diffBonus > 0 ? '+' : ''}${player.diffBonus.toFixed(1)}</span>
                    </td>
                    <td class="px-6 py-4 text-center text-slate-600 font-medium">
                        +${player.gamesBonus.toFixed(1)}
                    </td>
                    <td class="px-6 py-4 text-center font-medium text-slate-700">${player.games}</td>
                `;
                
                tbody.appendChild(row);
            });

            document.getElementById('playerCount').textContent = `Menampilkan ${filteredPlayers.length} Pemain`;
        }

        function renderStats() {
            const summaryDiv = document.getElementById('statsSummary');
            
            if(filteredPlayers.length === 0) {
                 summaryDiv.innerHTML = '';
                 return;
            }

            const avgGames = (filteredPlayers.reduce((sum, p) => sum + p.games, 0) / filteredPlayers.length).toFixed(1);
            const avgWinRate = (filteredPlayers.reduce((sum, p) => sum + p.winRate, 0) / filteredPlayers.length).toFixed(1);
            const bestAvgDiff = Math.max(...filteredPlayers.map(p => p.avgDiff)).toFixed(2);
            
            const stats = [
                { label: "Total Players", value: filteredPlayers.length, icon: "👥", color: "text-purple-600", bg: "bg-purple-50" },
                { label: "Avg Games", value: avgGames, icon: "🎾", color: "text-lime-600", bg: "bg-lime-50" },
                { label: "Avg Win Rate", value: `${avgWinRate}%`, icon: "📈", color: "text-emerald-600", bg: "bg-emerald-50" },
                { label: "Best Avg Diff", value: `+${bestAvgDiff}`, icon: "🔥", color: "text-rose-600", bg: "bg-rose-50" }
            ];

            summaryDiv.innerHTML = stats.map(stat => `
                <div class="bg-white p-4 rounded-2xl border border-slate-100 shadow-sm flex flex-col items-center justify-center text-center transform transition duration-300 hover:-translate-y-1 hover:shadow-md">
                    <div class="w-10 h-10 ${stat.bg} rounded-full flex items-center justify-center text-xl mb-2">
                        ${stat.icon}
                    </div>
                    <div class="text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1">${stat.label}</div>
                    <div class="text-xl font-bold ${stat.color}">${stat.value}</div>
                </div>
            `).join('');
        }

        // Initialize on page load
        document.addEventListener('DOMContentLoaded', () => {
            filterPlayers();
        });
    </script>
</body>
</html>
